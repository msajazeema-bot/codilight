<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="64" viewBox="0 0 280 64" role="img" aria-label="CodiLight logo">
  <defs>
    <style>
      .t{font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-weight:700; fill:#ffffff}
      .s{font-size:18px; fill:rgba(255,255,255,0.85); font-weight:600}
      .tag{font-size:10px; fill:rgba(255,255,255,0.75); font-weight:500}
    </style>
  </defs>
  <!-- Left chevrons -->
  <g transform="translate(4,6)">
    <polygon points="0,24 18,12 18,36" fill="#ffffff" opacity="1" />
    <polygon points="22,24 40,12 40,36" fill="#cfe6ff" opacity="0.0" />
  </g>

  <!-- Brand name -->
  <g transform="translate(60,18)">
    <text class="t" x="0" y="18" font-size="26">CodiLight</text>
    <text class="tag" x="0" y="36">Next-Gen Ready.</text>
  </g>
</svg>