<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Codilight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0e27',
                            800: '#151931',
                        },
                        primary: {
                            500: '#3b82f6',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Codilight" class="h-10 w-auto" onerror="this.style.display='none'">
            </div>
            <h1 class="text-2xl font-bold">CodiLight</h1>
            <h1 class="text-3xl font-bold">Admin Portal</h1>
            <p class="text-gray-400 mt-2">Lead Management System</p>
        </div>
        
        <!-- Login Form -->
        <div class="bg-dark-800/50 border border-white/10 rounded-2xl p-8 backdrop-blur">
            {% if error %}
            <div class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username" placeholder="admin" required
                           class="w-full bg-dark-900/50 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500/50 transition text-white placeholder-gray-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full bg-dark-900/50 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500/50 transition text-white placeholder-gray-500">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-green-500 hover:from-blue-600 hover:to-green-600 px-6 py-3 rounded-lg font-semibold transition">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg text-sm text-blue-300">
                <p><strong>Demo Credentials:</strong></p>
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-8">
            © 2024 Codilight. All rights reserved.
        </p>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = this.querySelector('input[name="username"]').value;
            const password = this.querySelector('input[name="password"]').value;
            
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    window.location.href = data.redirect;
                } else {
                    location.reload();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
