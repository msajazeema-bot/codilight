<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0e27',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-white flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="text-8xl font-bold mb-4 text-blue-400">404</div>
        <h1 class="text-4xl font-bold mb-4">Page Not Found</h1>
        <p class="text-gray-400 mb-8 text-lg">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="bg-gradient-to-r from-blue-500 to-green-500 hover:from-blue-600 hover:to-green-600 px-8 py-3 rounded-lg font-semibold inline-block transition">
            <i class="fas fa-home mr-2"></i> Go Home
        </a>
    </div>
</body>
</html>
