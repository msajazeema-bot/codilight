<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { dark: { 900: '#0a0e27', 800: '#151931' } } } } }
    </script>
</head>
<body class="bg-dark-900 text-white">
    <div class="flex h-screen">
        <div class="w-64 bg-dark-800 border-r border-white/10 p-6 flex flex-col">
            <a href="/admin/dashboard" class="flex items-center gap-2 mb-8 hover:opacity-80 transition">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Codilight" class="h-8 w-auto" onerror="this.style.display='none'">
                <span class="font-bold text-lg">CodiLight</span>
            </a>
            <nav class="flex-1 space-y-2">
                <a href="/admin/dashboard" class="block px-4 py-3 rounded-lg transition {% if request.path.startswith('/admin/dashboard') %}bg-blue-500/20 text-blue-300 font-semibold{% else %}hover:bg-dark-700{% endif %}">
                    <i class="fas fa-chart-bar mr-3"></i> Dashboard
                </a>
                <a href="/admin/portfolio" class="block px-4 py-3 rounded-lg transition {% if request.path.startswith('/admin/portfolio') %}bg-blue-500/20 text-blue-300 font-semibold{% else %}hover:bg-dark-700{% endif %}">
                    <i class="fas fa-briefcase mr-3"></i> Portfolio
                </a>
                <a href="/admin/testimonials" class="block px-4 py-3 rounded-lg transition {% if request.path.startswith('/admin/testimonials') %}bg-blue-500/20 text-blue-300 font-semibold{% else %}hover:bg-dark-700{% endif %}">
                    <i class="fas fa-comment-dots mr-3"></i> Testimonials
                </a>
            </nav>
            <div class="border-t border-white/10 pt-6">
                <a href="/admin/logout" class="block px-4 py-3 text-red-400 hover:bg-red-500/20 rounded-lg transition">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </a>
            </div>
        </div>

        <div class="flex-1 overflow-auto">
            <div class="bg-dark-800 border-b border-white/10 px-8 py-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-3xl font-bold">Portfolio Management</h1>
                </div>
            </div>

            <div class="p-8">
                <div class="bg-dark-800 border border-white/10 rounded-lg p-6 mb-6">
                    <form method="POST" action="/admin/api/portfolio" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input name="title" placeholder="Title" required class="col-span-2 bg-dark-900/50 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        <input type="file" name="image" accept="image/*" class="bg-dark-900/50 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        <textarea name="description" placeholder="Description" class="col-span-3 bg-dark-900/50 border border-white/10 rounded-lg px-4 py-2 text-white" rows="3"></textarea>
                        <div class="col-span-3 text-right">
                            <button type="submit" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-lg font-semibold">Add Portfolio Item</button>
                        </div>
                    </form>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {% for item in items %}
                    <div class="bg-dark-800 border border-white/10 rounded-lg p-4">
                        {% if item.image_filename %}
                        <img src="{{ url_for('static', filename='uploads/' + item.image_filename) }}" alt="{{ item.title }}" class="w-full h-40 object-cover rounded-md mb-3" />
                        {% endif %}
                        <h3 class="font-semibold text-lg">{{ item.title }}</h3>
                        <p class="text-sm text-gray-300 mb-3">{{ item.description or '' }}</p>
                        <div class="flex justify-between items-center">
                            <small class="text-gray-400">{{ item.created_at.strftime('%Y-%m-%d') }}</small>
                            <button onclick="deleteItem({{ item.id }}, '/admin/api/portfolio/{{ item.id }}/delete')" class="text-red-400 hover:text-red-300">Delete</button>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        async function deleteItem(id, url) {
            if (!confirm('Delete this item?')) return;
            const res = await fetch(url, { method: 'DELETE' });
            if (res.ok) location.reload();
            else alert('Failed to delete');
        }
    </script>
</body>
</html>
